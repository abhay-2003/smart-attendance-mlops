apiVersion: apps/v1

kind: Deployment

metadata:
  name: smart-attendance-backend

spec:

  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      containers:

        - name: backend-container

          image: smart-attendance-backend:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          env:

            - name: PROJECT_NAME
              value: "Smart Attendance MLOps"

            - name: SIMILARITY_THRESHOLD
              value: "0.70"

            - name: EMBEDDINGS_PATH
              value: "data/embeddings/face_embeddings.pkl"

            - name: MLFLOW_TRACKING_URI
              value: "http://127.0.0.1:5000"

          resources:

            limits:
              memory: "2Gi"
              cpu: "1"

            requests:
              memory: "1Gi"
              cpu: "500m"