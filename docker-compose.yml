version: '3.9'

services:

  backend:

    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: smart-attendance-backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app

  frontend:

    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: smart-attendance-frontend

    ports:
      - "8501:8501"

    depends_on:
      - backend

    volumes:
      - .:/app