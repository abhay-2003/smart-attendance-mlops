version: "3.9"

services:

  backend:

    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: smart-attendance-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

    restart: always

  frontend:

    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: smart-attendance-frontend

    ports:
      - "8501:8501"

    depends_on:
      - backend

    env_file:
      - .env

    volumes:
      - .:/app

    restart: always